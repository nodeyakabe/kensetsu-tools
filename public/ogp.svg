    <rect x="146" y="246" width="60" height="140" fill="#FFFFFF"/>
    <rect x="306" y="246" width="60" height="140" fill="#FFFFFF"/>
    <rect x="96" y="416" width="320" height="40" rx="8" fill="#FFFFFF"/>
